server:
  port: 8080

spring:
  application:
    name: file-manage-system

  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/filemanage_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    database-platform: org.hibernate.dialect.MySQL8Dialect

  # Mail Configuration (QQ邮箱SMTP)
  mail:
    host: smtp.qq.com
    port: 587
    username: cuixianbai@qq.com
    password: hgenfobfpritbfhi
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            enable: true

  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# File Storage Configuration
file:
  storage:
    dir-a: ..\storage\INPUT
    dir-b: ..\storage\OUTPUT

# JWT Configuration
jwt:
  secret: your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters-long
  expiration: 86400000

# Logging (生产环境级别)
logging:
  level:
    com.filemanage: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN